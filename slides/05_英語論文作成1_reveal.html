:root {

  --color-accent: #0097A7;

section {

section.title { text-align: center; display: flex; flex-direction: column; justify-content: center; border-bottom: 3px solid var(--color-line); }

<h3 id="%E5%B7%A5%E5%A4%AB%E2%91%A0-span-classtealai%E3%83%84%E3%83%BC%E3%83%AB%E3%81%AE%E5%BD%B9%E5%89%B2%E3%82%92%E5%88%86%E3%81%91%E3%82%8Bspan">工夫① <span class="teal">AIツールの役割を分ける</span></h3>
<p>検索はPerplexityやGoogle Scholar、要約・比較はGeminiやChatGPT、長い本文の整理はClaudeのように、<span class="highlight">用途ごとにAIを使い分ける</span>提出があった。これは文献調査として実践的。</p>
<h3 id="%E5%B7%A5%E5%A4%AB%E2%91%A1-span-classteal%E5%AD%98%E5%9C%A8%E3%81%97%E3%81%AA%E3%81%84%E8%AB%96%E6%96%87%E3%82%92%E4%BD%9C%E3%82%89%E3%81%AA%E3%81%84%E3%81%A8%E6%98%8E%E7%A4%BA%E3%81%99%E3%82%8Bspan">工夫② <span class="teal">「存在しない論文を作らない」と明示する</span></h3>
<p>プロンプトに「存在しない論文名・著者名・DOIは作らない」「URLやarXiv IDを示す」と入れている提出があった。AIによる文献調査では、この指定が重要。</p>
<h3 id="%E5%B7%A5%E5%A4%AB%E2%91%A2-span-classteal%E8%8B%B1%E8%AA%9E%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E3%81%BE%E3%81%A7%E5%BA%83%E3%81%92%E3%82%8Bspan">工夫③ <span class="teal">英語キーワードまで広げる</span></h3>
<p>日本語の研究テーマをそのまま検索せず、英語キーワード・周辺分野・未解決課題まで広げていた提出は、文献候補の幅が広かった。</p>

<h2 id="%E5%8F%82%E8%80%83%E3%81%AB%E3%81%AA%E3%81%A3%E3%81%9F%E5%B7%A5%E5%A4%AB22">参考になった工夫（2/2）</h2>
<h3 id="%E5%B7%A5%E5%A4%AB%E2%91%A3-span-classteal%E5%90%84%E8%AB%96%E6%96%87%E3%82%92%E8%87%AA%E5%88%86%E3%81%AE%E7%A0%94%E7%A9%B6%E3%81%A8%E3%81%AE%E9%96%A2%E9%80%A3%E3%81%BE%E3%81%A7%E6%88%BB%E3%81%99span">工夫④ <span class="teal">各論文を「自分の研究との関連」まで戻す</span></h3>
<p>単なる論文要約で終わらず、「この論文は自分の研究のどの部分に効くのか」を書いている提出が良かった。文献調査は、論文を集める作業ではなく、<span class="highlight">自分の研究の位置づけを作る作業</span>。</p>
<h3 id="%E5%B7%A5%E5%A4%AB%E2%91%A4-span-classteal%E6%96%B0%E8%A6%8F%E6%80%A7%E3%82%92%E6%AF%94%E8%BC%83%E8%BB%B8%E3%81%A7%E8%AA%AC%E6%98%8E%E3%81%99%E3%82%8Bspan">工夫⑤ <span class="teal">新規性を比較軸で説明する</span></h3>
<p>「対象データが違う」「評価指標が違う」「実装環境が違う」「既存研究は検出精度、本研究は回避耐性を見る」のように、差分を軸で説明している提出は説得力があった。</p>
<h3 id="%E5%B7%A5%E5%A4%AB%E2%91%A5-span-classtealai%E3%81%A8%E3%81%AE%E5%AF%BE%E8%A9%B1%E3%83%AD%E3%82%B0%E3%82%92%E6%AE%8B%E3%81%99span">工夫⑥ <span class="teal">AIとの対話ログを残す</span></h3>
<p>プロンプトと出力を残している提出は、どのように調査を進めたかが追跡できた。研究ノートとしても価値がある。</p>
<footer>情報論 2026 ｜ matsulab</footer>

<h2 id="%E5%85%B1%E9%80%9A%E3%81%AE%E8%90%BD%E3%81%A8%E3%81%97%E7%A9%B4">共通の落とし穴</h2>
<h3 id="%E8%90%BD%E3%81%A8%E3%81%97%E7%A9%B4%E2%91%A0-span-classredai%E5%87%BA%E5%8A%9B%E3%81%AE%E8%B2%BC%E3%82%8A%E4%BB%98%E3%81%91%E3%81%8C%E5%A4%9A%E3%81%99%E3%81%8E%E3%82%8Bspan">落とし穴① <span class="red">AI出力の貼り付けが多すぎる</span></h3>
<p>プロンプトと出力を残すのは良いが、レポート本文では自分で整理する必要がある。AIの出力全文は、本文ではなく付録・別添に回すと読みやすい。</p>
<h3 id="%E8%90%BD%E3%81%A8%E3%81%97%E7%A9%B4%E2%91%A1-span-classred%E5%87%BA%E5%85%B8%E6%83%85%E5%A0%B1%E3%81%8C%E4%B8%8D%E8%B6%B3%E3%81%99%E3%82%8Bspan">落とし穴② <span class="red">出典情報が不足する</span></h3>
<p>タイトルだけでは、後から論文を確認できない。最低限、<span class="highlight">著者・年・出版先・URL/DOI/arXiv ID</span> を残すこと。</p>
<h3 id="%E8%90%BD%E3%81%A8%E3%81%97%E7%A9%B4%E2%91%A2-span-classred%E6%96%B0%E8%A6%8F%E6%80%A7%E3%81%8C%E3%81%BE%E3%81%A0%E3%82%84%E3%82%89%E3%82%8C%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84%E3%81%A0%E3%81%91%E3%81%AB%E3%81%AA%E3%82%8Bspan">落とし穴③ <span class="red">新規性が「まだやられていない」だけになる</span></h3>
<p>「やられていない」は証明が難しい。次のように書く方が強い。</p>
<blockquote>
<p>既存研究はAを対象にしている。本研究はBを対象にし、Cという評価指標で比較する。</p>
</blockquote>
<footer>情報論 2026 ｜ matsulab</footer>
