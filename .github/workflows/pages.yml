name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble publishable site (HTML/PDF only)
        run: |
          mkdir -p _site/slides
          cp .nojekyll _site/
          cp index.html _site/
          cp slides/deck.css _site/slides/
          # 第0〜4回（OD含む）のHTMLスライドとPDFのみを公開対象に含める。
          # PPTX / Markdown ソース / 補講ファイルは公開しない。
          cp slides/0[0-4]_*_reveal.html _site/slides/
          cp slides/0[0-4]_*.pdf _site/slides/
          echo "=== Published files ==="
          find _site -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
