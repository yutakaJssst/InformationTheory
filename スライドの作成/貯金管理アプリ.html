<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貯金管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', 'Inter', sans-serif;
        }
        .toast {
            visibility: hidden;
            min-width: 250px;
            margin-left: -125px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            opacity: 0;
            transition: visibility 0s, opacity 0.5s linear;
        }
        .toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-indigo-600">貯金管理アプリ</h1>
            <p class="text-gray-600 mt-2">毎月の収支を管理し、目標達成をサポートします。</p>
            <div id="storage-info" class="mt-4 text-xs text-gray-500">データはご利用のブラウザに保存されます。</div>
        </header>

        <main id="app-content">
            <!-- サマリーセクション -->
            <section class="bg-white p-6 rounded-xl shadow-md mb-8">
                <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-700">今月のサマリー</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                    <div>
                        <p class="text-sm text-gray-500">収入</p>
                        <p id="summary-income" class="text-2xl font-semibold text-green-600">0円</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">固定支出</p>
                        <p id="summary-expenses" class="text-2xl font-semibold text-red-600">0円</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">基本貯蓄可能額</p>
                        <p id="summary-balance" class="text-2xl font-semibold text-blue-600">0円</p>
                    </div>
                </div>
                <hr class="my-6">
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-center">
                    <div class="bg-indigo-50 p-4 rounded-lg">
                        <p class="text-sm text-gray-600">目標のための月々貯金額</p>
                        <p id="summary-goal-savings" class="text-2xl font-bold text-indigo-700">0円</p>
                    </div>
                    <div class="bg-teal-50 p-4 rounded-lg">
                        <p class="text-sm text-gray-600">今月の最終貯金目標</p>
                        <p id="summary-total-savings" class="text-2xl font-bold text-teal-700">0円</p>
                        <p class="text-xs text-gray-500">(基本貯蓄の30% + 目標貯金)</p>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- 収支入力セクション -->
                <div class="space-y-8">
                    <section class="bg-white p-6 rounded-xl shadow-md">
                        <h2 class="text-xl font-bold mb-4 text-gray-700">収入</h2>
                        <div class="flex items-center gap-4">
                            <input type="number" id="income-input" placeholder="毎月の手取り収入" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                            <button id="save-income" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition font-semibold whitespace-nowrap">保存</button>
                        </div>
                    </section>

                    <section class="bg-white p-6 rounded-xl shadow-md">
                        <h2 class="text-xl font-bold mb-4 text-gray-700">固定支出</h2>
                        <div id="expenses-list" class="space-y-3 mb-4">
                            <!-- 支出項目がここに追加されます -->
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="text" id="expense-name-input" placeholder="項目名 (例: 家賃)" class="w-1/2 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            <input type="number" id="expense-amount-input" placeholder="金額" class="w-1/2 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                         <button id="add-expense" class="w-full mt-4 bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition font-semibold">支出を追加</button>
                    </section>
                </div>

                <!-- 目標設定セクション -->
                <div class="space-y-8">
                    <section class="bg-white p-6 rounded-xl shadow-md">
                        <h2 class="text-xl font-bold mb-4 text-gray-700">大きな買い物の目標</h2>
                        <div id="goals-list" class="space-y-3 mb-4">
                            <!-- 目標項目がここに追加されます -->
                        </div>
                        <div class="space-y-4">
                             <input type="text" id="goal-name-input" placeholder="目標名 (例: 旅行)" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                             <input type="number" id="goal-amount-input" placeholder="目標金額" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                             <input type="date" id="goal-date-input" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-gray-500">
                        </div>
                        <button id="add-goal" class="w-full mt-4 bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-semibold">目標を追加</button>
                    </section>
                </div>
            </div>
        </main>
        
        <div id="toast" class="toast"></div>
    </div>

    <script>
        // --- グローバル変数と設定 ---
        const APP_DATA_KEY = 'savingsManagementAppData';
        let userData = {
            income: 0,
            expenses: [],
            goals: []
        };

        // --- UI要素の取得 ---
        const incomeInput = document.getElementById('income-input');
        const saveIncomeBtn = document.getElementById('save-income');
        const expensesListEl = document.getElementById('expenses-list');
        const expenseNameInput = document.getElementById('expense-name-input');
        const expenseAmountInput = document.getElementById('expense-amount-input');
        const addExpenseBtn = document.getElementById('add-expense');
        const goalsListEl = document.getElementById('goals-list');
        const goalNameInput = document.getElementById('goal-name-input');
        const goalAmountInput = document.getElementById('goal-amount-input');
        const goalDateInput = document.getElementById('goal-date-input');
        const addGoalBtn = document.getElementById('add-goal');

        // --- データ処理 (localStorage) ---
        function loadData() {
            const savedData = localStorage.getItem(APP_DATA_KEY);
            if (savedData) {
                userData = JSON.parse(savedData);
            }
        }

        function saveData() {
            try {
                localStorage.setItem(APP_DATA_KEY, JSON.stringify(userData));
            } catch (error) {
                console.error("Error saving data to localStorage:", error);
                showToast("データの保存に失敗しました。");
            }
        }
        
        // --- レンダリング（描画）処理 ---
        function renderAll() {
            renderIncome();
            renderExpenses();
            renderGoals();
            calculateAndRenderSummary();
        }

        function renderIncome() {
            incomeInput.value = userData.income || '';
        }

        function renderExpenses() {
            expensesListEl.innerHTML = '';
            if (!userData.expenses || userData.expenses.length === 0) {
                expensesListEl.innerHTML = '<p class="text-gray-400 text-sm">登録された支出はありません。</p>';
                return;
            }
            userData.expenses.forEach((expense, index) => {
                const el = document.createElement('div');
                el.className = 'flex items-center justify-between p-2 bg-gray-100 rounded-lg';
                el.innerHTML = `
                    <span>${escapeHTML(expense.name)}</span>
                    <div class="flex items-center gap-2">
                        <span class="font-medium">${Number(expense.amount).toLocaleString()}円</span>
                        <button data-index="${index}" class="delete-expense text-red-500 hover:text-red-700">&times;</button>
                    </div>
                `;
                expensesListEl.appendChild(el);
            });
        }

        function renderGoals() {
            goalsListEl.innerHTML = '';
            if (!userData.goals || userData.goals.length === 0) {
                goalsListEl.innerHTML = '<p class="text-gray-400 text-sm">登録された目標はありません。</p>';
                return;
            }
            userData.goals.forEach((goal, index) => {
                const monthlySaving = calculateMonthlyGoalSaving(goal);
                const el = document.createElement('div');
                el.className = 'p-3 bg-gray-100 rounded-lg';
                el.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="font-semibold">${escapeHTML(goal.name)}</span>
                        <button data-index="${index}" class="delete-goal text-red-500 hover:text-red-700 text-xl">&times;</button>
                    </div>
                    <p class="text-sm text-gray-600">目標: ${Number(goal.amount).toLocaleString()}円 (${goal.targetDate})</p>
                    <p class="text-sm text-indigo-600 font-medium">月々の必要額: ${monthlySaving.toLocaleString()}円</p>
                `;
                goalsListEl.appendChild(el);
            });
        }

        // --- 計算処理 ---
        function calculateAndRenderSummary() {
            const totalExpenses = userData.expenses.reduce((sum, item) => sum + Number(item.amount), 0);
            const balance = (userData.income || 0) - totalExpenses;
            const totalGoalSavings = userData.goals.reduce((sum, goal) => sum + calculateMonthlyGoalSaving(goal), 0);
            
            // 基本貯蓄額の30%を通常の貯金目標とする
            const baseSavings = balance > 0 ? Math.floor(balance * 0.3) : 0;
            const totalSavingsTarget = baseSavings + totalGoalSavings;

            document.getElementById('summary-income').textContent = `${Number(userData.income || 0).toLocaleString()}円`;
            document.getElementById('summary-expenses').textContent = `${totalExpenses.toLocaleString()}円`;
            document.getElementById('summary-balance').textContent = `${balance.toLocaleString()}円`;
            document.getElementById('summary-goal-savings').textContent = `${totalGoalSavings.toLocaleString()}円`;
            document.getElementById('summary-total-savings').textContent = `${totalSavingsTarget.toLocaleString()}円`;
        }

        function calculateMonthlyGoalSaving(goal) {
            const today = new Date();
            const targetDate = new Date(goal.targetDate);
            today.setDate(1);
            targetDate.setDate(1);

            if (targetDate <= today) return Number(goal.amount);

            const yearDiff = targetDate.getFullYear() - today.getFullYear();
            const monthDiff = targetDate.getMonth() - today.getMonth();
            const totalMonths = yearDiff * 12 + monthDiff;

            if (totalMonths <= 0) return Number(goal.amount);

            return Math.ceil(Number(goal.amount) / totalMonths);
        }

        // --- イベントリスナー ---
        saveIncomeBtn.addEventListener('click', () => {
            const newIncome = Number(incomeInput.value);
            if (newIncome >= 0) {
                userData.income = newIncome;
                saveData();
                renderAll();
                showToast("収入を保存しました。");
            } else {
                showToast("有効な収入額を入力してください。");
            }
        });

        addExpenseBtn.addEventListener('click', () => {
            const name = expenseNameInput.value.trim();
            const amount = Number(expenseAmountInput.value);
            if (name && amount > 0) {
                if (!userData.expenses) userData.expenses = [];
                userData.expenses.push({ name, amount });
                saveData();
                renderAll();
                expenseNameInput.value = '';
                expenseAmountInput.value = '';
                showToast("支出を追加しました。");
            } else {
                showToast("項目名と金額を正しく入力してください。");
            }
        });

        expensesListEl.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-expense')) {
                const index = e.target.dataset.index;
                userData.expenses.splice(index, 1);
                saveData();
                renderAll();
                showToast("支出を削除しました。");
            }
        });

        addGoalBtn.addEventListener('click', () => {
            const name = goalNameInput.value.trim();
            const amount = Number(goalAmountInput.value);
            const targetDate = goalDateInput.value;
            if (name && amount > 0 && targetDate) {
                if (!userData.goals) userData.goals = [];
                userData.goals.push({ name, amount, targetDate });
                saveData();
                renderAll();
                goalNameInput.value = '';
                goalAmountInput.value = '';
                goalDateInput.value = '';
                showToast("目標を追加しました。");
            } else {
                showToast("目標名、金額、日付をすべて入力してください。");
            }
        });

        goalsListEl.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-goal')) {
                const index = e.target.dataset.index;
                userData.goals.splice(index, 1);
                saveData();
                renderAll();
                showToast("目標を削除しました。");
            }
        });

        // --- ユーティリティ関数 ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        // --- アプリケーションの初期化と実行 ---
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderAll();
        });
    </script>
</body>
</html>
